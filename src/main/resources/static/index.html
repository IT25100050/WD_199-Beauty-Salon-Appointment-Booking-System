<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Beauty Salon - Staff Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #d63384; }
        .btn-pink {
            background-color: #d63384;
            color: white;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand fw-bold fs-4">
        💄 Beauty Salon Staff Management
    </span>
</nav>

<div class="container mt-4">

    <!-- Stats Row -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card text-center p-3">
                <h2 id="totalCount">0</h2>
                <p class="text-muted">Total Staff</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center p-3">
                <h2 id="availableCount"
                    class="text-success">0</h2>
                <p class="text-muted">Available</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center p-3">
                <h2 id="seniorCount"
                    class="text-danger">0</h2>
                <p class="text-muted">Senior Stylists</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-center p-3">
                <h2 id="juniorCount"
                    class="text-primary">0</h2>
                <p class="text-muted">Junior Stylists</p>
            </div>
        </div>
    </div>

    <!-- Add Button -->
    <div class="d-flex justify-content-between mb-3">
        <h4>👥 Stylist Directory</h4>
        <button class="btn btn-pink"
                onclick="showAddForm()">
            + Add New Stylist
        </button>
    </div>

    <!-- Add/Edit Form -->
    <div class="card p-4 mb-4"
         id="stylistForm" style="display:none">
        <h5 id="formTitle">Add New Stylist</h5>
        <input type="hidden" id="stylistId">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Full Name</label>
                <input type="text"
                       class="form-control"
                       id="fName"
                       placeholder="Enter name">
            </div>
            <div class="col-md-6 mb-3">
                <label>Specialty</label>
                <input type="text"
                       class="form-control"
                       id="fSpecialty"
                       placeholder="e.g. Hair Coloring">
            </div>
            <div class="col-md-6 mb-3">
                <label>Email</label>
                <input type="email"
                       class="form-control"
                       id="fEmail">
            </div>
            <div class="col-md-6 mb-3">
                <label>Phone</label>
                <input type="text"
                       class="form-control"
                       id="fPhone">
            </div>
            <div class="col-md-4 mb-3">
                <label>Status</label>
                <select class="form-control" id="fStatus">
                    <option value="available">Available</option>
                    <option value="busy">Busy</option>
                    <option value="off">Off Today</option>
                </select>
            </div>
            <div class="col-md-4 mb-3">
                <label>Type</label>
                <select class="form-control" id="fType">
                    <option value="senior">Senior Stylist</option>
                    <option value="junior">Junior Stylist</option>
                </select>
            </div>
            <div class="col-md-4 mb-3">
                <label>Experience (years)</label>
                <input type="number"
                       class="form-control"
                       id="fExperience" min="0">
            </div>
            <div class="col-md-6 mb-3">
                <label>Rating (1-5)</label>
                <input type="number"
                       class="form-control"
                       id="fRating"
                       min="1" max="5" step="0.1">
            </div>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-pink"
                    onclick="saveStylist()">
                💾 Save
            </button>
            <button class="btn btn-secondary"
                    onclick="hideForm()">
                Cancel
            </button>
        </div>
    </div>

    <!-- Filter Buttons -->
    <div class="mb-3">
        <button class="btn btn-outline-secondary btn-sm me-2"
                onclick="loadStylists()">All</button>
        <button class="btn btn-outline-success btn-sm me-2"
                onclick="filterByStatus('available')">
            Available
        </button>
        <button class="btn btn-outline-warning btn-sm me-2"
                onclick="filterByStatus('busy')">
            Busy
        </button>
        <button class="btn btn-outline-danger btn-sm me-2"
                onclick="filterByType('senior')">
            Senior
        </button>
        <button class="btn btn-outline-primary btn-sm"
                onclick="filterByType('junior')">
            Junior
        </button>
    </div>

    <!-- Stylist Cards -->
    <div class="row" id="stylistList"></div>

</div>

<script>
    const API = '/api/stylists';

    async function loadStylists() {
        const res = await fetch(API);
        const stylists = await res.json();
        displayStylists(stylists);
        updateStats(stylists);
    }

    function displayStylists(stylists) {
        const list = document.getElementById('stylistList');
        if (stylists.length === 0) {
            list.innerHTML = `
                <div class="col-12 text-center py-5">
                    <h5 class="text-muted">
                        No stylists found
                    </h5>
                </div>`;
            return;
        }
        list.innerHTML = stylists.map(s => `
            <div class="col-md-4 mb-4">
                <div class="card p-3">
                    <div class="d-flex justify-content-between">
                        <h5>${s.name}</h5>
                        <span class="badge ${
                            s.type === 'senior'
                            ? 'bg-danger' : 'bg-primary'
                        }">
                            ${s.type === 'senior'
                              ? 'Senior' : 'Junior'}
                        </span>
                    </div>
                    <p class="text-muted mb-1">
                        💅 ${s.specialty}
                    </p>
                    <p class="mb-1">✉ ${s.email}</p>
                    <p class="mb-1">📞 ${s.phone}</p>
                    <p class="mb-1">
                        ⭐ ${s.rating} |
                        🕐 ${s.experienceYears} years
                    </p>
                    <p class="mb-2">
                        <span class="badge ${
                            s.status === 'available'
                            ? 'bg-success'
                            : s.status === 'busy'
                            ? 'bg-warning text-dark'
                            : 'bg-secondary'
                        }">
                            ${s.status}
                        </span>
                    </p>
                    <div class="d-flex gap-2 mt-2">
                        <button class="btn btn-sm btn-pink"
                                onclick="editStylist(${s.id})">
                            ✏️ Edit
                        </button>
                        <button class="btn btn-sm btn-danger"
                                onclick="deleteStylist(${s.id})">
                            🗑️ Delete
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function updateStats(stylists) {
        document.getElementById('totalCount')
            .textContent = stylists.length;
        document.getElementById('availableCount')
            .textContent = stylists
            .filter(s => s.status === 'available').length;
        document.getElementById('seniorCount')
            .textContent = stylists
            .filter(s => s.type === 'senior').length;
        document.getElementById('juniorCount')
            .textContent = stylists
            .filter(s => s.type === 'junior').length;
    }

    function showAddForm() {
        document.getElementById('formTitle')
            .textContent = 'Add New Stylist';
        document.getElementById('stylistId').value = '';
        document.getElementById('fName').value = '';
        document.getElementById('fSpecialty').value = '';
        document.getElementById('fEmail').value = '';
        document.getElementById('fPhone').value = '';
        document.getElementById('fStatus').value = 'available';
        document.getElementById('fType').value = 'junior';
        document.getElementById('fExperience').value = '';
        document.getElementById('fRating').value = '';
        document.getElementById('stylistForm')
            .style.display = 'block';
    }

    function hideForm() {
        document.getElementById('stylistForm')
            .style.display = 'none';
    }

    async function saveStylist() {
        const id = document.getElementById('stylistId').value;
        const data = {
            name: document.getElementById('fName').value,
            specialty: document.getElementById('fSpecialty').value,
            email: document.getElementById('fEmail').value,
            phone: document.getElementById('fPhone').value,
            status: document.getElementById('fStatus').value,
            type: document.getElementById('fType').value,
            experienceYears: parseInt(
                document.getElementById('fExperience').value),
            rating: parseFloat(
                document.getElementById('fRating').value)
        };

        if (id) {
            await fetch(`${API}/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });
        } else {
            await fetch(API, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });
        }
        hideForm();
        loadStylists();
    }

    async function editStylist(id) {
        const res = await fetch(`${API}/${id}`);
        const s = await res.json();
        document.getElementById('formTitle')
            .textContent = 'Edit Stylist';
        document.getElementById('stylistId').value = s.id;
        document.getElementById('fName').value = s.name;
        document.getElementById('fSpecialty').value = s.specialty;
        document.getElementById('fEmail').value = s.email;
        document.getElementById('fPhone').value = s.phone;
        document.getElementById('fStatus').value = s.status;
        document.getElementById('fType').value = s.type;
        document.getElementById('fExperience').value =
            s.experienceYears;
        document.getElementById('fRating').value = s.rating;
        document.getElementById('stylistForm')
            .style.display = 'block';
    }

    async function deleteStylist(id) {
        if (confirm('Are you sure you want to delete?')) {
            await fetch(`${API}/${id}`, {method: 'DELETE'});
            loadStylists();
        }
    }

    async function filterByStatus(status) {
        const res = await fetch(`${API}/status/${status}`);
        const stylists = await res.json();
        displayStylists(stylists);
    }

    async function filterByType(type) {
        const res = await fetch(`${API}/type/${type}`);
        const stylists = await res.json();
        displayStylists(stylists);
    }

    loadStylists();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
